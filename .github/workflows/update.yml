name: Update March Madness Scores

on:
  schedule:
    # Every 10 minutes during tournament game windows
    # Games typically run noon-midnight ET = 17:00-05:00 UTC
    # March 19-22 (R64/R32), March 27-30 (S16/E8), April 4+6 (F4/Champ)
    - cron: '*/10 16-23 19-22 3 *'        # R64 + R32 daytime (noon-8PM ET)
    - cron: '*/10 0-5 20-23 3 *'          # R64 + R32 late night (8PM-1AM ET, next UTC day)
    - cron: '*/10 16-23 26-30 3 *'        # Sweet 16 + Elite Eight daytime
    - cron: '*/10 0-5 27-31 3 *'          # Sweet 16 + Elite Eight late night
    - cron: '*/10 16-23 4,6 4 *'          # Final Four + Championship daytime
    - cron: '*/10 0-5 5,7 4 *'            # Final Four + Championship late night
    - cron: '0 13 26-30 3 *'               # Morning spread fetch: 9AM ET on Sweet 16 + E8 game days
    - cron: '0 13 4,6 4 *'                # Morning spread fetch: 9AM ET on F4/Championship game days
    - cron: '0 10 20-23,28-31 3 *'        # Morning cleanup: 6AM ET after game days
    - cron: '0 10 5,7 4 *'                # Morning cleanup: 6AM ET after F4/Championship

  workflow_dispatch: {}  # Manual trigger button in GitHub UI

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run score updater
        run: python update.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit and push if changed
        run: |
          git diff --quiet index.html && echo "No changes" && exit 0
          git config user.name "March Madness Bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html
          git commit -m "Update scores $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
