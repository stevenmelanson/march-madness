name: Update March Madness Scores

on:
  schedule:
    # Every 10 minutes during tournament game windows
    # Games typically run noon-midnight ET = 17:00-05:00 UTC
    # March 19-22 (R64/R32), March 27-30 (S16/E8), April 4+6 (F4/Champ)
    - cron: '*/10 16-23,0-4 19-22 3 *'   # R64 + R32
    - cron: '*/10 16-23,0-4 27-30 3 *'   # Sweet 16 + Elite Eight
    - cron: '*/10 16-23,0-4 4,6 4 *'     # Final Four + Championship

  workflow_dispatch: {}  # Manual trigger button in GitHub UI

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run score updater
        run: python update.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit and push if changed
        run: |
          git diff --quiet index.html && echo "No changes" && exit 0
          git config user.name "March Madness Bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html
          git commit -m "Update scores $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
